<script>

   비워두면(") 내장된 샘플 데이터(2026년 5~7월)로 표시됩니다.
   ============================================================ */
var SCHEDULE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSh97mBwhOpIFBkqqZ5MNfh9hHOCjRlb7E2L2wZ5Y5biQmAZolWIzKnArYbZk-jDP4d5Z1T53AJVs7g/pub?gid=2038188993&single=true&output=csv";   /* 일정 시트 CSV 주소 (필수) */
var STORES_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSh97mBwhOpIFBkqqZ5MNfh9hHOCjRlb7E2L2wZ5Y5biQmAZolWIzKnArYbZk-jDP4d5Z1T53AJVs7g/pub?gid=743461190&single=true&output=csv";   /* 매장 목록 시트 CSV 주소 (선택, 비우면 내장 목록 사용) */
var REPORTS_CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLFIrSatd-0vtueexT2y4uZQf4O1icT8EXm5JT7DhP91DK7bPbRlRCNJrE_VlnTBStx5xfXvrsu74I/pub?gid=2118325494&single=true&output=csv";   /* 라운딩 보고서 제출현황 시트 CSV 주소 (선택, 구글폼 응답 시트를 웹에 게시해서 연결. 비워두면 이전처럼 날짜 경과만으로 완료 표시) */
var ISSUES_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLFIrSatd-0vtueexT2y4uZQf4O1icT8EXm5JT7DhP91DK7bPbRlRCNJrE_VlnTBStx5xfXvrsu74I/pub?gid=465377158&single=true&output=csv";   /* 이슈트래커 시트 CSV 주소 (선택). 열 구성: 등록일 | 매장명 | 구분 | 내용 | 상태 | 조치예정일 */
var ISSUE_UPDATE_URL = "https://script.google.com/macros/s/AKfycbyHimUg704plGR6IXjHqFjFC6IuEmRf_SF6zxX-i7iaEJvY9xeFwTMfffBni8LIHevs/exec";   /* 이슈 상태를 시트에 저장하는 Apps Script 웹앱 URL (선택, 비우면 화면에서만 임시로 반영됩니다) */
</script>
<style>
:root{
  --bg:#F5F4F0; --card:#FFFFFF; --ink:#1E1D2B; --ink-2:#5C5A6E; --ink-3:#96949F;
  --line:#E4E2DC; --accent:#534AB7; --accent-soft:#EEEDFE; --accent-deep:#26215C;
  --green:#1D9E75; --green-soft:#E1F5EE; --green-deep:#085041;
  --amber:#BA7517; --amber-soft:#FAEEDA; --amber-deep:#633806;
  --pink:#D4537E; --pink-soft:#FBEAF0; --pink-deep:#72243E;
  --red:#C0392B; --red-soft:#FCEBEB; --red-deep:#791F1F;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px 48px;}
.topnav{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.topnav-in{max-width:1080px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;}
.brand i{color:var(--accent);font-size:20px;}
.sync{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:5px;}
.sync.on{color:var(--green);}
.notice{background:var(--amber-soft);color:var(--amber-deep);font-size:13px;padding:10px 14px;border-radius:8px;margin:16px 0 0;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin:28px 0 20px;}
.page-head h1{font-size:22px;font-weight:700;}
.page-head p{font-size:13px;color:var(--ink-2);margin-top:2px;}
.month-pick select{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
.kpi-link{cursor:pointer;}
.kpi-link:hover{border-color:var(--ink-3);}
.kpi .lbl{font-size:12px;color:var(--ink-2);}
.kpi .val{font-size:26px;font-weight:700;margin-top:2px;}
.kpi .sub{font-size:12px;margin-top:6px;color:var(--ink-3);}
.kpi .sub.bad{color:var(--red);}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:10px;}
.bar>span{display:block;height:100%;background:var(--accent);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media (max-width:820px){.grid-2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;transition:box-shadow .3s;}
.card h2{font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cal-hd-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.cal-title-wrap{margin-bottom:14px;}
.cal-cheer{font-size:13px;font-weight:600;color:#1E1D2B;background:transparent;padding:4px 0;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;}
.cal-cheer .emoji{font-size:16px;}
.cal-cheer b{font-size:19px;font-weight:800;font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;color:#1E1D2B;margin:0 1px;}
.cal-eyebrow{font-size:11px;font-weight:400;color:var(--ink-2);display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.cal-eyebrow i{font-size:12px;color:var(--accent);}
.cal-big-title{font-size:26px;font-weight:800;color:var(--ink);line-height:1.15;}
.card h2 i{font-size:20px;color:var(--accent);}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal .dow{text-align:center;font-size:12px;color:var(--ink-3);padding:4px 0;}
.cal .day{background:transparent;border:1px solid var(--line);border-radius:8px;padding:6px;min-height:74px;font-size:12.5px;}
.cal .day .num{font-weight:600;color:var(--ink-2);margin-bottom:3px;}
.cal .day.empty{background:transparent;border-color:transparent;}
.cal .day.today{border:2px solid var(--accent);}
.cal .day.today .num{color:var(--accent-deep);}
.cal .day.holiday .num{color:#C0392B;}
.hol{display:block;font-size:11px;font-weight:700;color:#C0392B;line-height:1.5;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev{display:block;font-size:11px;font-weight:600;line-height:1.5;padding:1px 5px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-more{display:block;font-size:11px;font-weight:600;color:var(--ink-3);padding:1px 5px;}
@media (max-width:700px){.cal .day{min-height:58px;padding:4px;}.ev{font-size:11px;padding:1px 3px;}.hol{font-size:10.5px;}}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--ink-2);}
.tabs{display:flex;gap:4px;padding:0 20px;max-width:1080px;margin:0 auto;}
.tab-btn{font-family:inherit;font-size:13.5px;font-weight:600;color:var(--ink-3);background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 6px;cursor:pointer;margin-right:14px;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);}
.tab-btn:hover{color:var(--ink);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block;}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;margin-right:8px;}
.stores{display:grid;grid-template-columns:1fr 1fr;gap:2px 20px;}
@media (max-width:700px){.stores{grid-template-columns:1fr;}}
.store{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--line);font-size:13px;}
.store .no{color:var(--ink-3);font-size:11.5px;min-width:20px;}
.store .nm{flex:1;}
.store-grp{margin-bottom:20px;}
.store-grp:last-child{margin-bottom:0;}
.store-grp-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:2px solid var(--ink);margin-bottom:8px;}
.store-grp-hd .ttl{font-size:14.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;}
.store-grp-hd .ttl i{font-size:17px;color:var(--accent);}
.store-grp-hd .cnt{font-size:12px;color:var(--ink-2);}
.store-grp-hd .cnt b{color:var(--green-deep);font-weight:700;}
.tag{font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;}
.tag.done{background:var(--green-soft);color:var(--green-deep);}
.tag.plan{background:var(--accent-soft);color:var(--accent-deep);}
.tag.miss{background:var(--amber-soft);color:var(--amber-deep);}
.tag.none{background:var(--red-soft);color:var(--red-deep);}
.glance-grp{margin-bottom:12px;}
.glance-grp:last-child{margin-bottom:0;}
.glance-hd{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ink-2);padding-bottom:4px;border-bottom:1px solid var(--line);margin-bottom:2px;}
#insights .glance-hd{font-size:16px;font-weight:700;color:var(--ink);}
#insights .glance-hd i.dot{display:none;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:520px){.insight-grid{grid-template-columns:1fr;}}
.insight-tile{border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:120px;}
.insight-tile-hd{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink-2);}
.insight-tile-hd i{font-size:16px;color:var(--accent);}
.insight-tile-body{flex:1;display:flex;flex-direction:column;justify-content:center;}
.insight-big{font-size:22px;font-weight:800;color:var(--ink);line-height:1.2;}
.insight-sub{font-size:12px;color:var(--ink-2);margin-top:4px;line-height:1.5;}
.glance-hd i.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.glance-hd .cnt{margin-left:auto;font-weight:600;font-size:11.5px;color:var(--ink-3);}
.glance-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--line);}
.glance-row:last-child{border-bottom:none;}
.glance-row .dt{min-width:38px;font-size:12px;color:var(--ink-3);}
.glance-row .nm{flex:1;}
.glance-row.past{opacity:.55;}
.sl-sub{margin-top:8px;}
.sl-sub:first-of-type{margin-top:6px;}
.sl-sub-hd{display:flex;align-items:center;font-size:11.5px;font-weight:700;color:var(--ink);padding:3px 0;border-bottom:1px dashed var(--line);}
.sl-sub-hd .cnt{margin-left:auto;font-weight:600;font-size:11px;color:var(--ink-3);}
.sl-rows{display:grid;grid-template-columns:1fr 1fr;column-gap:14px;}
.sl-row{padding:5px 0;font-size:12.5px;font-weight:400;color:var(--ink);border-bottom:1px dashed var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-row:nth-child(odd){border-right:1px solid var(--line);padding-right:12px;}
.sl-row:nth-child(even){padding-left:12px;}
.sl-row:nth-last-child(-n+2){border-bottom:none;}
.glance-empty{font-size:12.5px;color:var(--ink-3);padding:5px 0;}
.ss-list{max-height:640px;overflow-y:auto;}
.ss-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px;transition:background-color .3s;}
.ss-item.flash{background-color:var(--accent-soft);}
.card.flash-border{box-shadow:0 0 0 3px var(--accent-soft);}
.ss-item:hover{background:var(--bg);}
.ss-item.active{background:var(--accent-soft);}
.ss-item .ss-nm{flex:1;font-size:13.5px;color:var(--ink);}
.ss-item.active .ss-nm{color:var(--accent-deep);font-weight:600;}
.ss-item .ss-type{font-size:11px;color:var(--ink-3);min-width:44px;}
.ss-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 20px;color:var(--ink-3);}
.ss-detail-empty i{font-size:32px;margin-bottom:10px;}
.ss-detail-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.ss-detail-hd h3{font-size:17px;font-weight:700;color:var(--ink);}
.ss-detail-hd .sub{font-size:12.5px;color:var(--ink-3);margin-top:2px;}
.ss-store-hd{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.ss-store-hd i{font-size:22px;color:var(--accent);}
.ss-store-hd h2{font-size:20px;font-weight:800;color:var(--ink);}
.ss-date-section{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;flex-wrap:wrap;gap:12px;}
.ss-date-section .sub{font-size:12.5px;color:var(--ink-3);margin-top:4px;}
.ss-date-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.ss-report{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.ss-report .rhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ss-report .rhd .rdt{font-size:12.5px;font-weight:700;color:var(--ink);}
.ss-report .rlink{font-size:12.5px;font-weight:600;color:var(--text-accent,var(--accent));text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.ss-summary{background:var(--bg);border-radius:8px;padding:12px 14px;margin-top:8px;}
.ss-summary .lbl{font-size:11.5px;font-weight:700;color:var(--accent-deep);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.ss-summary p{font-size:13px;line-height:1.7;color:var(--ink-2);}
.ss-summary.empty p{color:var(--ink-3);font-style:normal;}
.ss-months{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ss-months .mchip{background:var(--bg);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--ink-2);}
.ss-months .mchip b{color:var(--ink);font-weight:700;}
.ss-date-grp{margin-bottom:4px;}
.ss-month-grp{margin-bottom:6px;}
.ss-month-hd{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--ink);padding:12px 8px 4px;border-top:1px solid var(--line);}
.ss-month-grp:first-child .ss-month-hd{border-top:none;padding-top:0;}
.ss-month-hd.collapsible{cursor:pointer;}
.ss-month-hd .ss-chev{font-size:15px;color:var(--ink-3);transition:transform .2s;}
.ss-month-hd .cur{font-size:11px;font-weight:700;color:var(--accent-deep);background:var(--accent-soft);padding:1px 8px;border-radius:20px;}
.ss-month-hd .cnt{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--ink-3);}
.ss-date-hd{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:var(--ink-3);padding:10px 8px 4px;}
.ss-date-hd .wd{color:var(--ink-2);}
.ss-big-date{font-size:26px;font-weight:800;color:var(--ink);line-height:1.2;}
.ss-big-date .wd{font-size:15px;font-weight:600;color:var(--ink-3);margin-left:6px;}
.ss-big-date .tag{vertical-align:middle;margin-left:4px;font-size:12px;padding:3px 10px;}
.ss-report-btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-size:13.5px;font-weight:700;padding:10px 18px;border-radius:9px;text-decoration:none;}
.ss-report-btn i{font-size:16px;}
.ss-report-btn.disabled{background:var(--bg);color:var(--ink-3);pointer-events:none;}
.issue-grp{margin-bottom:18px;}
.issue-grp:last-child{margin-bottom:0;}
.issue-grp-hd{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;padding-bottom:8px;border-bottom:2px solid var(--line);margin-bottom:8px;}
.issue-grp-hd .dot{width:9px;height:9px;border-radius:50%;}
.issue-grp-hd .cnt{margin-left:auto;font-size:12px;font-weight:600;color:var(--ink-3);}
.issue-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);transition:background-color .3s;}
.issue-row.flash{background-color:var(--accent-soft);border-radius:8px;}
.issue-row .body{flex:1;min-width:0;}
.issue-row .issue-seg{flex-shrink:0;}
.issue-row:last-child{border-bottom:none;}
.issue-row .icon{font-size:16px;color:var(--accent);margin-top:2px;}
.issue-row .body{flex:1;}
.issue-row .meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-3);margin-bottom:3px;}
.issue-row .txt{font-size:13px;color:var(--ink);line-height:1.55;}
.issue-row .due{font-size:11.5px;color:var(--amber-deep);margin-top:3px;}
.issue-row .issue-note{font-size:11.5px;color:var(--ink-3);margin-top:3px;font-style:italic;}
.issue-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.issue-resolve{display:flex;align-items:center;gap:6px;}
.issue-resolve label{font-size:10.5px;color:var(--ink-3);}
.issue-resolve input[type="date"]{font-family:inherit;font-size:11px;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--card);}
.issue-row .due.overdue{color:var(--red-deep);font-weight:700;}
.fb-copy-btn{background:transparent;border:1px solid var(--line);border-radius:7px;font-size:11px;font-weight:600;color:var(--ink-2);padding:5px 10px;cursor:pointer;margin-top:8px;display:inline-flex;align-items:center;gap:4px;}
.fb-copy-btn i{font-size:13px;}
.fb-copy-btn.copied{color:var(--green-deep);border-color:var(--green);}
.fb-status{display:flex;align-items:center;gap:8px;margin-top:10px;}
.fb-status .fb-status-lbl{font-size:11px;color:var(--ink-3);}
.fb-seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.seg-btn{font-family:inherit;background:var(--card);border:none;font-size:11.5px;font-weight:700;color:var(--ink-3);padding:6px 12px;cursor:pointer;}
.seg-btn+.seg-btn{border-left:1px solid var(--line);}
.seg-btn.active.bad{background:var(--red-soft);color:var(--red-deep);}
.seg-btn.active.mid{background:var(--amber-soft);color:var(--amber-deep);}
.seg-btn.active.good{background:var(--green-soft);color:var(--green-deep);}
.seg-btn.active.sel{background:var(--accent-soft);color:var(--accent-deep);}
.fb-status-saved{font-size:10.5px;color:var(--ink-3);}
.fb-issue-card{grid-column:1/-1;}
.fb-issue-item{border-top:1px dashed var(--line);padding:10px 0;}
.fb-issue-item:first-of-type{border-top:none;padding-top:2px;}
.fb-issue-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.fb-issue-label{font-size:13.5px;font-weight:700;color:var(--ink);}
.fb-issue-detail{font-size:12px;color:var(--ink-3);margin-top:3px;line-height:1.5;}
.fb-issue-item .fb-seg{flex-shrink:0;}
.fb-issue-item .seg-btn{padding:4px 9px;font-size:10.5px;}
.ss-score-panel{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 16px 18px;border:1px solid var(--line);border-radius:14px;margin:14px 0 16px;}
.ss-score-chips{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap;width:100%;}

/* ============================================================

};
function getHoliday(Y,M,D){
  var list=HOLIDAYS[Y]; if(!list) return null;
  for(var i=0;i<list.length;i++){ if(list[i][0]===M&&list[i][1]===D) return list[i][2]; }
  return null;
}
var dows=["일","월","화","수","목","금","토"];
var MON_EN=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MON_FULL=["","January","February","March","April","May","June","July","August","September","October","November","December"];
var palette=[["#534AB7","var(--accent-soft)","var(--accent-deep)"],["#D4537E","var(--pink-soft)","var(--pink-deep)"],["#BA7517","var(--amber-soft)","var(--amber-deep)"],["#0F6E56","var(--green-soft)","var(--green-deep)"]];
var whoStyle={};

function parseCSV(text){
  var rows=[],row=[],cur="",q=false;
  text=text.replace(/^\uFEFF/,"");
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else if(ch==='"') q=true;
    else if(ch===','){ row.push(cur);cur=""; }
    else if(ch==='\n'){ row.push(cur);cur="";rows.push(row);row=[]; }
    else if(ch!=='\r') cur+=ch;
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows.filter(function(r){return r.some(function(c){return c.trim()!=="";});});
}

function parseDate(s){
  s=(s||"").trim();
  var m=s.match(/(\d{4})[.\-\/년\s]+(\d{1,2})[.\-\/월\s]+(\d{1,2})/);
  if(!m) return null;
  return {y:+m[1],m:+m[2],d:+m[3]};
}

var schedule=[], storeList=[], reports=[], issues=[], usingSample=false, useReportStatus=false;

function normalize(rows){
  var out=[];
  rows.forEach(function(r,i){
    if(i===0 && /날짜|date/i.test(r[0])) return;
    var dt=parseDate(r[0]); if(!dt) return;
    out.push({y:dt.y,m:dt.m,d:dt.d,who:(r[1]||"기타").trim(),t:(r[2]||"").trim()});
  });
  return out;
}

function normalizeReports(rows){
  if(!rows.length) return [];
  var header=rows[0].map(function(c){return (c||"").toLowerCase();});
  var headerLoose=header.map(function(h){return h.replace(/\s+/g,"");});
  function findCol(keys){
    var keysLoose=keys.map(function(k){return k.toLowerCase().replace(/\s+/g,"");});
    for(var i=0;i<header.length;i++){ if(keys.indexOf(header[i])>=0) return i; }
    for(var i=0;i<headerLoose.length;i++){ for(var k=0;k<keysLoose.length;k++){ if(headerLoose[i].indexOf(keysLoose[k])>=0) return i; } }
    return -1;
  }
  function findNum(row,col){ if(col<0) return null; var v=parseFloat((row[col]||"").toString().replace(/[^\d.]/g,"")); return isNaN(v)?null:v; }
  function gradeToPoints(v){
    v=(v||"").toString().trim().toUpperCase();
    if(v==="A") return 5; if(v==="B") return 3; if(v==="C") return 1;
    return null;
  }
  var dateCol=findCol(["방문일자","방문일","일자","date"]);
  var storeCol=findCol(["매장명","매장","store"]);
  var linkCol=findCol(["파일","링크","보고서","file","link"]);
  var sumCol=findCol(["피드백","요약","의견","코멘트","summary","feedback"]);

  /* 상세 점수표(그리드 문항, 행별 A/B/C) 항목별 열 인식 */
  var GRID_ITEMS={
    "매장관리":["매장내외정리","청결상태","창고정리","인테리어유지보수","피팅룸관리","피팅룸"],
    "근무상태":["고객응대","용모단정","자사상품정보숙지","상품정보숙지"],
    "디스플레이":["mnq디스플레이","acc디스플레이","pop디스플레이","hanger디스플레이"]
  };
  var gridCols={};
  Object.keys(GRID_ITEMS).forEach(function(cat){
    gridCols[cat]=[];
    GRID_ITEMS[cat].forEach(function(kw){
      for(var i=0;i<headerLoose.length;i++){
        if(headerLoose[i].indexOf(kw)>=0 && gridCols[cat].indexOf(i)<0){ gridCols[cat].push(i); break; }
      }
    });
  });
  var hasGrid=Object.keys(gridCols).some(function(cat){return gridCols[cat].length;});
  /* 그리드가 없을 때를 대비한 예전 방식(단순 1~5점 질문) 폴백 */
  var mgmtCol=findCol(["매장관리"]);
  var workCol=findCol(["근무상태"]);
  var dispCol=findCol(["디스플레이"]);

  var out=[];
  for(var r=1;r<rows.length;r++){
    var row=rows[r];
    var dt=dateCol>=0?parseDate(row[dateCol]):null;
    var store=storeCol>=0?(row[storeCol]||"").trim():"";
    if(!dt||!store) continue;
    var scores={};
    if(hasGrid){
      Object.keys(GRID_ITEMS).forEach(function(cat){
        var pts=gridCols[cat].map(function(c){return gradeToPoints(row[c]);}).filter(function(v){return v!==null;});
        scores[cat]=pts.length?Math.round((pts.reduce(function(a,b){return a+b;},0)/pts.length)*10)/10:null;
      });
    }else{
      scores={매장관리:findNum(row,mgmtCol),근무상태:findNum(row,workCol),디스플레이:findNum(row,dispCol)};
    }
    out.push({y:dt.y,m:dt.m,d:dt.d,store:store,link:linkCol>=0?(row[linkCol]||"").trim():"",summary:sumCol>=0?(row[sumCol]||"").trim():"",scores:scores});
  }
  return out;
}

function normalizeIssues(rows){
  if(!rows.length) return [];
  var header=rows[0].map(function(c){return (c||"").toLowerCase();});
  var headerLoose=header.map(function(h){return h.replace(/\s+/g,"");});
  function findCol(keys){
    var keysLoose=keys.map(function(k){return k.replace(/\s+/g,"");});
    for(var i=0;i<header.length;i++){ if(keys.indexOf(header[i])>=0) return i; }
    for(var i=0;i<headerLoose.length;i++){ for(var k=0;k<keysLoose.length;k++){ if(headerLoose[i].indexOf(keysLoose[k])>=0) return i; } }
    return -1;
  }
  var dateCol=findCol(["등록일","일자","date"]);
  var storeCol=findCol(["매장명","매장"]);
  var typeCol=findCol(["구분","분류"]);
  var contentCol=findCol(["내용"]);
  var statusCol=findCol(["상태"]);
  var dueCol=findCol(["조치예정일","조치예정","예정일"]);
  var resolvedCol=findCol(["해결일자","해결일"]);
  var noteCol=findCol(["부연설명","비고","메모","note"]);
  var out=[];
  for(var r=1;r<rows.length;r++){
    var row=rows[r];
    var dt=dateCol>=0?parseDate(row[dateCol]):null;
    var content=contentCol>=0?(row[contentCol]||"").trim():"";
    if(!content) continue;
    var due=dueCol>=0?parseDate(row[dueCol]):null;
    var resolved=resolvedCol>=0?parseDate(row[resolvedCol]):null;
    out.push({
      y:dt?dt.y:null, m:dt?dt.m:null, d:dt?dt.d:null,
      store:storeCol>=0?(row[storeCol]||"").trim():"",
      type:typeCol>=0?(row[typeCol]||"").trim():"",
      content:content,
      status:(statusCol>=0?(row[statusCol]||"").trim():"")||"미해결",
      due:due,
      resolved:resolved,
      note:noteCol>=0?(row[noteCol]||"").trim():""
    });
  }
  return out;
}

function toDate(o){ return new Date(o.y,o.m-1,o.d); }
var REPORT_MATCH_WINDOW=7;
function matchReports(){
  var byStore={};
  schedule.forEach(function(e){ e._matched=false; e._report=null; if(storeList.indexOf(e.t)>=0){ (byStore[e.t]=byStore[e.t]||[]).push(e); } });
  var reportsByStore={};
  reports.forEach(function(r){ (reportsByStore[r.store]=reportsByStore[r.store]||[]).push(r); });
  var unmatchedReports=[];
  Object.keys(reportsByStore).forEach(function(nm){
    var visits=(byStore[nm]||[]).slice().sort(function(a,b){return toDate(a)-toDate(b);});
    var reps=reportsByStore[nm].slice().sort(function(a,b){return toDate(a)-toDate(b);});
    reps.forEach(function(rep){
      var bestIdx=-1,bestDiff=Infinity;
      visits.forEach(function(v,idx){
        if(v._matched) return;
        var diff=Math.abs((toDate(rep)-toDate(v))/86400000);
        if(diff<=REPORT_MATCH_WINDOW && diff<bestDiff){ bestDiff=diff; bestIdx=idx; }
      });
      if(bestIdx>=0){ visits[bestIdx]._matched=true; visits[bestIdx]._report=rep; }
      else if(storeList.indexOf(nm)>=0){ unmatchedReports.push(rep); }
    });
  });
  /* 일정에 없는 날짜로 보고서가 제출되면, 그 날짜로 새 라운딩 일정을 자동 생성합니다 */
  if(unmatchedReports.length){
    unmatchedReports.forEach(function(rep){
      schedule.push({y:rep.y,m:rep.m,d:rep.d,who:"전체",t:rep.store,_matched:true,_report:rep,_adhoc:true});
    });
    schedule.sort(function(a,b){return (a.y-b.y)||(a.m-b.m)||(a.d-b.d);});
  }
}
/* 보고서 안의 매장요청사항/운영이슈 문장을 미리 훑어서, 클릭하지 않아도
   이슈 트래커 탭에 "미해결" 상태로 바로 보이도록 등록해둡니다. */
function syncIssuesFromReports(){
  schedule.forEach(function(ev){
    if(!ev._report || storeList.indexOf(ev.t)<0) return;
    var pf=parseFeedback(ev._report.summary);
    pf.sections.forEach(function(s){
      if(s.label!=="매장 요청사항"&&s.label!=="운영이슈 및 개선사항") return;
      extractIssueItems(s.raw).forEach(function(it){
        registerIssue(ev.t,s.label,it.label,ev);
      });
    });
  });
}
/* 2026-07-01부터 "보고서 제출 기준 완료"를 적용합니다.
   그 이전(5~6월) 일정은 보고서 제도가 없었으므로 날짜 경과 기준으로 자동 완료 처리합니다. */
var REPORT_CUTOFF={y:2026,m:7,d:1};
function beforeCutoff(e){ return toDate(e) < toDate(REPORT_CUTOFF); }
function isDone(e){
  if(!useReportStatus) return isPastOrToday(e);
  if(beforeCutoff(e)) return isPastOrToday(e);
  return !!e._report;
}
function isMissing(e){
  if(!useReportStatus) return false;
  if(beforeCutoff(e)) return false;
  return (!e._report && isPastOrToday(e));
}

var now=new Date(); var TY=now.getFullYear(), TM=now.getMonth()+1, TD=now.getDate();
function isPastOrToday(e){ return e.y<TY||(e.y===TY&&(e.m<TM||(e.m===TM&&e.d<=TD))); }

/* 분기 기준: 5월 시작 3개월 단위 (5~7 / 8~10 / 11~1 / 2~4).
   실제 팀 라운딩 사이클(3개월마다 전 매장 순회)에 맞춘 내부 기준이며,
   달력상 표준 분기(1~3,4~6,7~9,10~12)와는 다릅니다. */
function quarterOf(m){ return Math.floor(((m-5+12)%12)/3)+1; }
function quarterAnchor(Y,M){
  var idx=((M-5+12)%12);
  var diff=idx-Math.floor(idx/3)*3;
  var startM=M-diff, startY=Y;
  while(startM<1){ startM+=12; startY-=1; }
  while(startM>12){ startM-=12; startY+=1; }
  return {y:startY,m:startM};
}
function quarterMonthList(Y,M){
  var a=quarterAnchor(Y,M), list=[], y=a.y, m=a.m;
  for(var i=0;i<3;i++){ list.push({y:y,m:m}); m++; if(m>12){m=1;y++;} }
  return list;
}

var quarterStats={done:0,total:0,label:"",neverVisited:[],q:1,qm:[1,2,3],Y:0};
function computeQuarterStats(Y,M){
  var q=quarterOf(M), qml=quarterMonthList(Y,M);
  var inQuarter=function(e){ return qml.some(function(p){ return p.y===e.y && p.m===e.m; }); };
  var visitedStores={};
  schedule.forEach(function(e){ if(storeList.indexOf(e.t)>=0 && inQuarter(e) && isDone(e)) visitedStores[e.t]=true; });
  quarterStats.total=storeList.length;
  quarterStats.done=Object.keys(visitedStores).length;
  var first=qml[0], last=qml[2];
  quarterStats.label=(first.y===last.y)
    ? (first.y+"년 "+q+"분기 ("+first.m+"~"+last.m+"월)")
    : (first.y+"년 "+q+"분기 ("+first.m+"월~"+last.y+"년 "+last.m+"월)");
  quarterStats.q=q; quarterStats.qm=qml.map(function(p){return p.m;}); quarterStats.qml=qml; quarterStats.Y=first.y;
  quarterStats.neverVisited=storeList.filter(function(nm){ return !schedule.some(function(e){ return e.t===nm && inQuarter(e); }); });
}

function startOfWeek(d){ var day=d.getDay(); var diff=(day===0?-6:1-day); var r=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff); return r; }
function fromDate(d){ return {y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate()}; }

function renderInsights(){
  var qPct=quarterStats.total?Math.round(quarterStats.done/quarterStats.total*100):0;
  var today0=new Date(TY,TM-1,TD);

  var next=schedule.filter(function(e){return storeList.indexOf(e.t)>=0 && !isDone(e) && toDate(e)>=today0;})
    .sort(function(a,b){return toDate(a)-toDate(b);})[0];
  var nextSameDay=next?schedule.filter(function(e){
    return storeList.indexOf(e.t)>=0 && !isDone(e) && e.y===next.y && e.m===next.m && e.d===next.d;
  }):[];

  var unresolved=issues.filter(function(is){return is.status==="미해결"&&is.y;}).sort(function(a,b){return toDate(a)-toDate(b);});
  var oldest=unresolved[0], elapsed=oldest?Math.round((today0-toDate(oldest))/86400000):0;

  var repeatMap={};
  issues.forEach(function(is){
    if(!is.store||!is.type) return;
    var k=is.store+"||"+is.type;
    repeatMap[k]=(repeatMap[k]||0)+1;
  });
  var repeatTop=null;
  Object.keys(repeatMap).forEach(function(k){ if(repeatMap[k]>=2 && (!repeatTop||repeatMap[k]>repeatTop.cnt)){ var p=k.split("||"); repeatTop={store:p[0],type:p[1],cnt:repeatMap[k]}; } });

function htmlEscape(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* 매장 라운딩 보고서 마지막 페이지의 고정 5개 항목명 (정확히 이 표현 기준으로 인식) */
var HEADER_ALIASES={
  "고객동향":["고객동향","고객 동향"],
  "상품 VOC 및 판매 동향":["상품 VOC 및 판매 동향","상품VOC 및 판매 동향","상품 VOC 및 판매동향","상품 voc 및 판매 동향","상품"],
  "VM 분석 및 인사이트":["VM 분석 및 인사이트","VM분석 및 인사이트","vm 분석 및 인사이트"],
  "매장 요청사항":["매장 요청사항","매장요청사항","매장 요청 사항","요청사항","인테리어 이슈","인테리어이슈"],
  "운영이슈 및 개선사항":["운영이슈 및 개선사항","운영 이슈 및 개선사항","운영이슈및개선사항","운영이슈"]
};
var CATEGORY_ICON={
  "고객동향":"ti-users",
  "상품 VOC 및 판매 동향":"ti-shopping-bag",

  "매장 요청사항":"ti-clipboard-list",
  "운영이슈 및 개선사항":"ti-alert-triangle"
};
function findAllOcc(hay,needle){
  var res=[],idx=0;
  while(true){ var f=hay.indexOf(needle,idx); if(f<0) break; res.push(f); idx=f+needle.length; }
  return res;
}
/* 항목명이 문서 안에 여러 번(비연속으로) 등장해도 전부 찾아서 나중에 같은 항목끼리 합칩니다.
   "상품","요청사항"처럼 짧아서 다른 문장 속에 우연히 섞일 수 있는 표현은,
   줄 맨 앞(진짜 항목 제목)에 있을 때만 인정합니다. */
function findFeedbackMarkers(body){
  var lower=body.toLowerCase();
  var markers=[];
  Object.keys(HEADER_ALIASES).forEach(function(canon){
    HEADER_ALIASES[canon].forEach(function(a){
      var la=a.toLowerCase();
      var occ=findAllOcc(lower,la);
      if(!occ.length) return;
      var lineStart=occ.filter(function(idx){ return idx===0||body[idx-1]==="\n"; });
      var use=lineStart.length?lineStart:(a.length>=4?occ.slice(0,1):[]);
      use.forEach(function(idx){ markers.push({index:idx,len:a.length,label:canon}); });
    });
  });
  markers.sort(function(a,b){return a.index-b.index;});
  var cleaned=[];
  markers.forEach(function(m){
    var last=cleaned[cleaned.length-1];
    if(last && m.index<last.index+last.len) return;
    cleaned.push(m);
  });
  return cleaned;
}
function extractPct(text){
  var m=text.match(/(\d{1,3})(?:\s*~\s*\d{1,3})?\s*%/);
  if(!m) return null;
  var v=parseInt(m[1],10);
  return (v>=0&&v<=100)?v:null;
}
function stripEmoji(text){
  return (text||"").replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE0F}\u{200D}]/gu,"").replace(/[ \t]{2,}/g," ");
}
function pctNear(text,keyword){
  var re=new RegExp(keyword+"[^%,.;]{0,20}?(\\d{1,3})(?:\\s*~\\s*(\\d{1,3}))?\\s*%");
  var m=text.match(re);
  if(!m) return null;
  var v=m[2]?Math.round((parseInt(m[1],10)+parseInt(m[2],10))/2):parseInt(m[1],10);
  return (v>=0&&v<=100)?v:null;
}
function extractMainCustomerType(text){
  var foreign=pctNear(text,"외국인");
  var domestic=pctNear(text,"내국인|국내");
  if(foreign!==null||domestic!==null){
    if(foreign!==null&&domestic!==null) return foreign>=domestic?"외국인":"내국인";
    return foreign!==null?"외국인":"내국인";
  }
  if(/외국인[^,.;]{0,15}?(중심|위주|우세|많은\s*편|다수)/.test(text)) return "외국인";
  if(/내국인[^,.;]{0,15}?(중심|위주|우세|많은\s*편|다수)/.test(text)) return "내국인";
  if(/(중심|위주|우세|많은\s*편|다수)[^,.;]{0,15}?외국인/.test(text)) return "외국인";
  if(/(중심|위주|우세|많은\s*편|다수)[^,.;]{0,15}?내국인/.test(text)) return "내국인";
  return null;
}
function extractMainCustomer(text){
  /* "5대"(마네킹 5대 등 수량)를 나이대로 오인하지 않도록, 10~90의 정배수이거나
     "2-30대"류 축약 표기일 때만 나이대로 인정합니다. */
  var ageMatch=text.match(/\d{1,2}\s*[-~]\s*\d{1,2}\s*대|[1-9]0\s*대/);
  var gender=null;
  if(/여성|여자/.test(text)) gender="여성";
  else if(/남성|남자/.test(text)) gender="남성";
  var parts=[];
  if(ageMatch) parts.push(ageMatch[0].replace(/\s+/g,""));
  if(gender) parts.push(gender);
  if(parts.length) return {text:parts.join(" "),gender:gender};
  var nat=extractMainCustomerType(text);
  return {text:nat,gender:null};
}
function renderBullets(text){
  var norm=(text||"").replace(/\r/g,"").replace(/\n\s*[-•●]\s*/g,"\n").split(/\n+/).join(". ");
  var items=dedupeSentences(norm.split(".").map(function(s){return s.trim();}).filter(function(s){return s.length>3;}));
  if(!items.length) return '<div class="fb-card-body">'+htmlEscape(text||"")+'</div>';
  return '<ul class="fb-bullets">'+items.map(function(s){
    var colonIdx=s.search(/[:：]/);
    if(colonIdx>0&&colonIdx<20){
      return '<li><b>'+htmlEscape(s.slice(0,colonIdx).trim())+'</b>: '+htmlEscape(s.slice(colonIdx+1).trim())+'.</li>';
    }
    return '<li>'+htmlEscape(s)+'.</li>';
  }).join("")+'</ul>';
}
/* 규칙 기반 자동 요약: 항목별 가중치 + 핵심 키워드 포함 여부로 문장 점수를 매겨 상위 1~2문장을 뽑습니다 */
function normDedup(s){ return s.replace(/[\s.,!?():"'★☆\-]/g,"").toLowerCase(); }
function dedupeSentences(list){
  var kept=[];
  list.forEach(function(s){
    var ns=normDedup(s);
    if(!ns) return;
    var dupIdx=-1;
    for(var i=0;i<kept.length;i++){
      var nk=normDedup(kept[i]);
      if(ns===nk||nk.indexOf(ns)>=0||ns.indexOf(nk)>=0){ dupIdx=i; break; }
    }
    if(dupIdx<0) kept.push(s);
    else if(s.length>kept[dupIdx].length) kept[dupIdx]=s;
  });
  return kept;
}
function autoSummarize(sections){
  var focus=["고객동향","상품 VOC 및 판매 동향","VM 분석 및 인사이트"];
  var WEIGHT={"VM 분석 및 인사이트":3,"상품 VOC 및 판매 동향":2,"고객동향":1};
  var KEY=/시급|필요|희망|강화|개선|제안|권장|추천/;
  var candidates=[];
  sections.forEach(function(s){
    if(focus.indexOf(s.label)<0) return;
    var text=((s.title?s.title+" ":"")+s.body).trim();
    splitSentences(text).forEach(function(sent){
      if(sent.length<8) return;
      var score=(WEIGHT[s.label]||1)+(KEY.test(sent)?2:0);
      candidates.push({sent:sent+".",score:score});
    });
  });
  candidates.sort(function(a,b){return b.score-a.score;});
  var picked=[];
  for(var i=0;i<candidates.length&&picked.length<2;i++){
    if(picked.indexOf(candidates[i].sent)<0) picked.push(candidates[i].sent);
  }
  return picked.join(" ");
}
function parseFeedback(raw){
  var text=stripEmoji((raw||"").trim());
  if(!text) return {sections:[],summary:"",autoGenerated:false};
  var smMatch=text.match(/★?\s*summary\s*★?\s*[:：]?/i);
  var body=text, manualSummary="";
  if(smMatch){ body=text.slice(0,smMatch.index).trim(); manualSummary=text.slice(smMatch.index+smMatch[0].length).trim(); }
  var markers=findFeedbackMarkers(body);
  var order=[], grouped={};
  for(var i=0;i<markers.length;i++){
    var start=markers[i].index, end=(i+1<markers.length)?markers[i+1].index:body.length;
    var chunk=body.slice(start+markers[i].len,end).trim();
    if(!chunk) continue;
    var lbl=markers[i].label;
    if(!grouped[lbl]){ grouped[lbl]=[]; order.push(lbl); }
    grouped[lbl].push(chunk);
  }
  var sections=order.map(function(lbl){
    var chunk=grouped[lbl].join(" ");
    var title="",bodyTxt=chunk;
    var colonIdx=chunk.search(/[:：]/);
    if(colonIdx>0 && colonIdx<32){ title=chunk.slice(0,colonIdx).trim(); bodyTxt=chunk.slice(colonIdx+1).trim(); }
    return {label:lbl,title:title,body:bodyTxt,raw:chunk,pct:extractPct(chunk)};
  });
  /* 고정 항목명(매장요청사항/운영이슈)이 텍스트에 없어서 못 나눈 경우,
     전체 피드백에서라도 조치 필요 문장을 찾아 이슈로 등록될 수 있게 폴백 처리합니다. */
  var hasActionable=sections.some(function(s){ return s.label==="매장 요청사항"||s.label==="운영이슈 및 개선사항"; });
  if(!hasActionable){
    var pool=(sections.length?sections.map(function(s){return s.raw;}).join(" "):body);
    var fallbackSentences=splitSentences(pool).filter(function(s){return ISSUE_KEY.test(s);});
    if(fallbackSentences.length){
      sections.push({label:"운영이슈 및 개선사항",title:"",body:fallbackSentences.join(". "),raw:fallbackSentences.join(". "),pct:null,_fallback:true});
    }
  }
  var summary=manualSummary||autoSummarize(sections);
  return {sections:sections, summary:summary, autoGenerated:!manualSummary};
}

var ISSUE_KEY=/시급|필요|요청|희망|강화|개선|부족|고장|훼손|반영|보수|지원|권장|튿어|찢어|파손|오염|불량|분실|누수|손상|미흡|불편/;
function shortLabel(sentence){
  var s=sentence.trim().replace(/\.$/,"");
  var LIMIT=20;
  if(s.length>LIMIT){
    var cut=s.slice(0,LIMIT);
    var lastSpace=cut.lastIndexOf(" ");
    if(lastSpace>6) cut=cut.slice(0,lastSpace);
    s=cut.trim();
  }
  if(!/(이슈|문제|사항)$/.test(s)) s+=" 이슈";
  return s;
}
function splitSentences(text){
  var norm=(text||"").replace(/\r/g,"").replace(/\n\s*[-•●]\s*/g,"\n").split(/\n+/).join(". ");
  return norm.split(".").map(function(s){return s.trim();}).filter(function(s){return s.length>3;});
}
function extractIssueItems(chunk){
  var sentences=splitSentences(chunk);
  var matched=dedupeSentences(sentences.filter(function(s){return ISSUE_KEY.test(s);}));
  var items=matched.length?matched:(sentences.length?[sentences[0]]:[]);
  return items.map(function(s){ return {detail:s+".", label:shortLabel(s)}; });
}

function issueMatch(is,store,type,content){ return is.store===store && is.type===type && is.content===content; }
function issueRowKey(store,type,content){ return (store||"")+"||"+(type||"")+"||"+(content||""); }
function registerIssue(store,type,content,dateInfo){
  var exists=issues.some(function(is){ return issueMatch(is,store,type,content); });
  if(!exists){
    issues.push({y:dateInfo?dateInfo.y:null,m:dateInfo?dateInfo.m:null,d:dateInfo?dateInfo.d:null,store:store,type:type,content:content,status:"미해결",due:null});
    return true;
  }
  return false;
}
function findIssueStatus(store,type,content){
  var found=issues.find(function(is){ return issueMatch(is,store,type,content); });
  return found?found.status:"미해결";
}
function setIssueStatus(store,type,content,dateStr,status){
  var found=issues.find(function(is){ return issueMatch(is,store,type,content); });
  if(found){ found.status=status; }
  else{ issues.push({y:null,m:null,d:null,store:store,type:type,content:content,status:status,due:null}); }
  if(ISSUE_UPDATE_URL){
    var qs="action=setStatus&store="+encodeURIComponent(store)+"&type="+encodeURIComponent(type)
      +"&content="+encodeURIComponent(content)+"&status="+encodeURIComponent(status)+"&date="+encodeURIComponent(dateStr);
    fetch(ISSUE_UPDATE_URL+"?"+qs,{mode:"no-cors"}).catch(function(){});
  }
  renderIssuesPage();
}

function setIssueField(store,type,content,field,value){
  var found=issues.find(function(is){ return issueMatch(is,store,type,content); });
  if(found){
    if(field==="해결일자") found.resolved=value?parseDate(value):null;
    if(field==="부연설명") found.note=value;
  }
  if(ISSUE_UPDATE_URL){
    var qs="action=setField&store="+encodeURIComponent(store)+"&type="+encodeURIComponent(type)
      +"&content="+encodeURIComponent(content)+"&field="+encodeURIComponent(field)+"&value="+encodeURIComponent(value);
    fetch(ISSUE_UPDATE_URL+"?"+qs,{mode:"no-cors"}).catch(function(){});
  }
}

function renderIssuesPage(){
  var today=new Date(TY,TM-1,TD);
  var counts={"미해결":0,"진행중":0,"완료":0};
  issues.forEach(function(is){ counts[is.status]=(counts[is.status]||0)+1; });

    '<div class="kpi"><div class="lbl">전체 이슈</div><div class="val">'+total+'건</div><div class="sub">이슈트래커 시트 기준</div></div>'

    +'<div class="kpi"><div class="lbl">진행중</div><div class="val" style="color:'+ISSUE_STATUS_COLOR["진행중"]+';">'+(counts["진행중"]||0)+'건</div><div class="sub">조치 진행 중</div></div>'
    +'<div class="kpi"><div class="lbl">완료</div><div class="val" style="color:'+ISSUE_STATUS_COLOR["완료"]+';">'+(counts["완료"]||0)+'건</div><div class="sub">조치 완료</div></div>';

  if(!issues.length){
    document.getElementById("issue-list").innerHTML='<p style="font-size:13px;color:var(--ink-3);">아직 등록된 이슈가 없어요. 이슈트래커 시트에 항목을 추가하거나, 매장별 라운딩현황의 피드백 카드에서 "이슈로 복사" 버튼으로 옮겨 붙여넣어보세요.</p>';
    return;
  }
  document.getElementById("issue-list").innerHTML=ISSUE_STATUS_ORDER.map(function(st){
    var list=issues.filter(function(is){return is.status===st;}).sort(function(a,b){
      var da=a.y?toDate(a):new Date(0), db=b.y?toDate(b):new Date(0);
      return db-da;
    });
    if(!list.length) return "";
    return '<div class="issue-grp"><div class="issue-grp-hd"><span class="dot" style="background:'+ISSUE_STATUS_COLOR[st]+';"></span>'+st+'<span class="cnt">'+list.length+'건</span></div>'
      +list.map(function(is){
        var icon=ISSUE_TYPE_ICON[is.type]||"ti-file-text";
        var dueTxt="";
        if(is.due && is.status!=="완료"){
          var overdue=toDate(is.due)<today;
          dueTxt='<div class="due'+(overdue?' overdue':'')+'">조치예정 '+is.due.m+'/'+is.due.d+(overdue?' · 기한 경과':'')+'</div>';
        }
        var noteTxt=is.note?'<div class="issue-note">'+htmlEscape(is.note)+'</div>':"";
        var pad2=function(n){return String(n).padStart(2,"0");};
        var resolvedVal=is.resolved?(is.resolved.y+"-"+pad2(is.resolved.m)+"-"+pad2(is.resolved.d)):"";
        var dateStr=is.y?(is.y+"-"+is.m+"-"+is.d):"";
        var resolveInput='<div class="issue-resolve"><label>해결일자</label><input type="date" class="issue-date-input" data-store="'+attrEscape(is.store||"")+'" data-type="'+attrEscape(is.type||"")+'" data-content="'+attrEscape(is.content||"")+'" value="'+resolvedVal+'"></div>';
        var seg='<div class="fb-seg issue-seg" data-store="'+attrEscape(is.store||"")+'" data-type="'+attrEscape(is.type||"")+'" data-content="'+attrEscape(is.content||"")+'" data-date="'+dateStr+'">'
          +'<button class="seg-btn'+(is.status==="미해결"?" active bad":"")+'" data-set="미해결">미해결</button>'
          +'<button class="seg-btn'+(is.status==="진행중"?" active mid":"")+'" data-set="진행중">진행중</button>'
          +'<button class="seg-btn'+(is.status==="완료"?" active good":"")+'" data-set="완료">완료</button>'
          +'</div>';
        return '<div class="issue-row" data-issue-key="'+attrEscape(issueRowKey(is.store,is.type,is.content))+'"><i class="ti '+icon+' icon"></i><div class="body">'
          +'<div class="meta">'+(is.store?'<b style="color:var(--ink);">'+htmlEscape(is.store)+'</b>':'')+(is.type?' · '+htmlEscape(is.type):'')+(is.y?' · '+is.m+'/'+is.d+' 등록':'')+'</div>'
          +'<div class="txt">'+htmlEscape(is.content)+'</div>'+dueTxt+noteTxt
          +'</div><div class="issue-right">'+seg+resolveInput+'</div></div>';
      }).join("")
      +'</div>';
  }).join("");
}

function loadCSV(url,timeoutMs){
  timeoutMs=timeoutMs||10000;
  var hasAC=typeof AbortController!=="undefined";
  var controller=hasAC?new AbortController():null;
  var timer=hasAC?setTimeout(function(){controller.abort();},timeoutMs):null;
  return fetch(url,hasAC?{signal:controller.signal}:{})
    .then(function(r){ if(timer)clearTimeout(timer); if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(parseCSV)
    .catch(function(e){ if(timer)clearTimeout(timer); throw e; });
}

function init(){
  var jobs=[];
  if(SCHEDULE_CSV_URL){ jobs.push(loadCSV(SCHEDULE_CSV_URL).then(function(rows){schedule=normalize(rows);})); }
  if(STORES_CSV_URL){ jobs.push(loadCSV(STORES_CSV_URL).then(function(rows){
    storeList=rows.filter(function(r,i){return !(i===0&&/번호|매장/.test(r.join()));}).map(function(r){return (r[1]||r[0]||"").trim();}).filter(Boolean);
  })); }
  if(REPORTS_CSV_URL){ jobs.push(loadCSV(REPORTS_CSV_URL).then(function(rows){ reports=normalizeReports(rows); useReportStatus=true; }).catch(function(){ useReportStatus=false; })); }
  if(ISSUES_CSV_URL){ jobs.push(loadCSV(ISSUES_CSV_URL).then(function(rows){ issues=normalizeIssues(rows); }).catch(function(){ issues=[]; })); }
  Promise.all(jobs).then(function(){
    if(!schedule.length){ usingSample=true; schedule=normalize(SAMPLE_SCHEDULE.map(function(r){return r;})); }
    if(!storeList.length){ storeList=SAMPLE_STORES.slice(); }
    schedule.sort(function(a,b){return (a.y-b.y)||(a.m-b.m)||(a.d-b.d);});
    matchReports();
    syncIssuesFromReports();
    var note=document.getElementById("stores-note");
    if(note){ note.textContent=useReportStatus?"완료는 라운딩 보고서 제출 기준 · 지난 일정인데 보고서가 없으면 미완료로 표시됩니다":"일정 시트에 등록된 전체 기간 기준 · 완료/예정은 오늘 날짜로 자동 계산 (보고서 시트를 연결하면 실제 제출 여부로 판정됩니다)"; }
    if(usingSample&&!SCHEDULE_CSV_URL){
      document.getElementById("notice").innerHTML='<div class="notice"><i class="ti ti-info-circle" style="vertical-align:-2px;"></i> 아직 스프레드시트가 연결되지 않아 내장 샘플 데이터를 표시하고 있어요. 파일 상단의 SCHEDULE_CSV_URL에 게시 주소를 입력하세요.</div>';
      setSync(false,"샘플 데이터");
    }else{
      setSync(true,"스프레드시트 연동됨");
    }
    render();
  }).catch(function(err){
    usingSample=true; schedule=normalize(SAMPLE_SCHEDULE); storeList=SAMPLE_STORES.slice();
    schedule.sort(function(a,b){return (a.y-b.y)||(a.m-b.m)||(a.d-b.d);});
    matchReports();
    syncIssuesFromReports();
    document.getElementById("notice").innerHTML='<div class="notice"><i class="ti ti-alert-circle" style="vertical-align:-2px;"></i> 스프레드시트를 불러오지 못해 샘플 데이터를 표시합니다. 게시 주소와 "웹에 게시" 설정을 확인하세요.</div>';
    setSync(false,"연동 실패 · 샘플 표시");
    render();
  });
}
init();
</script>
</body>
</html>
